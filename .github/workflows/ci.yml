name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm check:examples
      - run: pnpm test
      - run: pnpm ssr
      - run: pnpm package
      - run: pnpm smoke
      - run: pnpm smoke:wc
      - run: pnpm size
      - run: pnpm size:lib
