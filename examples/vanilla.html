<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bo-grid · vanilla custom element</title>
    <style>
      body { margin: 2rem; font: 14px system-ui, sans-serif; background: #111; color: #eee; }
      h1 { font-size: 1rem; font-weight: 600; }
      a { color: #818cf8; }
    </style>
  </head>
  <body>
    <h1>bo-grid in plain HTML/JS — the <code>&lt;bo-grid&gt;</code> custom element</h1>
    <p>No build step. See <a href="../docs/frameworks.md">docs/frameworks.md</a>.</p>

    <div id="host"></div>

    <script type="module">
      // Published package via a CDN (works once `bo-grid` is on npm). For local
      // dev against this repo, swap to: import '../dist/bo-grid.element.js';
      import { createBoGrid } from 'https://esm.sh/bo-grid/element';

      const rows = Array.from({ length: 200 }, (_, id) => ({
        id,
        flashSeq: 0,
        flashDir: 'up',
        symbol: 'SYM' + id,
        price: Math.round((50 + Math.sin(id) * 40) * 100) / 100,
        changePct: Math.round((Math.sin(id * 1.3) * 8) * 100) / 100,
      }));

      // createBoGrid() builds the element with `config` preset, then you attach
      // it (safe create-before-attach — no crash if attached before config).
      const grid = createBoGrid({
        theme: 'dark',
        height: 480,
        rowSelection: true,
        filterMenu: true,
        columns: [
          { type: 'text', key: 'symbol', header: 'Symbol', width: 120 },
          { type: 'price', key: 'price', header: 'Price', width: 100,
            headerTooltip: 'Last traded price (USD).', headerInfo: true },
          { type: 'percent', key: 'changePct', header: 'Chg %', width: 100, colorScale: { mid: 0 } },
          // JS render() hook: rich cells from plain JS (no Svelte snippet).
          { type: 'custom', key: 'dir', header: 'Trend', width: 90, render: ({ row }) => {
              const el = document.createElement('span');
              el.textContent = row.changePct >= 0 ? '▲ up' : '▼ down';
              el.style.color = row.changePct >= 0 ? 'var(--bo-grid-up)' : 'var(--bo-grid-down)';
              return el;
            } },
        ],
        rows,
        onCellEdit: (e) => console.log('edit', e),
      });
      grid.style.display = 'block';
      document.getElementById('host').append(grid);

      // Updating `config` re-renders reactively:
      // grid.config = { ...grid.config, theme: 'midnight' };
    </script>
  </body>
</html>
